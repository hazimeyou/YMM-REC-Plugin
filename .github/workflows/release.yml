name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_and_release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.x"

      - name: Set Version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build
        run: dotnet build .\YMM-REC-Plugin.sln -c Release -p:Version=$env:VERSION

      - name: Collect Package Files
        shell: pwsh
        run: |
          if (Test-Path package) { Remove-Item package -Recurse -Force }
          New-Item -ItemType Directory -Path package | Out-Null

          $pluginBin = "YMM-REC-Plugin\bin\Release\net10.0-windows"
          $requiredFiles = @(
            "YMM-REC-Plugin.dll",
            "YMM-REC-Plugin.deps.json"
          )

          foreach ($file in $requiredFiles) {
            $src = Join-Path $pluginBin $file
            if (!(Test-Path $src)) {
              throw "Required file not found: $src"
            }
            Copy-Item $src "package\$file" -Force
          }

          $pdb = Join-Path $pluginBin "YMM-REC-Plugin.pdb"
          if (Test-Path $pdb) {
            Copy-Item $pdb "package\YMM-REC-Plugin.pdb" -Force
          }

          Copy-Item "LICENSE" "package\LICENSE" -Force
          Copy-Item "README.md" "package\README.md" -Force

      - name: Create ZIP
        run: Compress-Archive -Path "package\*" -DestinationPath "YMM-REC-Plugin.zip"

      - name: Rename ZIP to .ymme
        run: Move-Item YMM-REC-Plugin.zip YMM-REC-Plugin.ymme

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          artifacts: YMM-REC-Plugin.ymme
          draft: true
          prerelease: true
